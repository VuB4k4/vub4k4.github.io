<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAW Mindmap | Vu Baka Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #11111b 0%, #1e1e2e 100%);
            color: #cdd6f4;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVIGATION BAR --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background-color: rgba(24, 24, 37, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #89b4fa;
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: #a6adc8;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .back-btn:hover {
            color: #f5c2e7;
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* --- MAIN CONTENT --- */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 35px;
            animation: slideUp 0.4s ease forwards;
        }

        .section-header h1 {
            font-size: 2rem;
            color: #89b4fa;
            margin-bottom: 10px;
        }

        .section-header p {
            color: #a6adc8;
            font-size: 1rem;
        }

        /* --- MINDMAP EMBED --- */
        .mindmap-wrapper {
            background-color: #313244;
            border-radius: 16px;
            border: 1px solid #45475a;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s ease;
            animation: slideUp 0.5s ease 0.1s forwards;
            opacity: 0;
        }

        .mindmap-wrapper:hover {
            box-shadow: 0 15px 50px rgba(137, 180, 250, 0.15);
            border-color: #89b4fa;
        }

        .mindmap-wrapper iframe {
            display: block;
            width: 100%;
            height: 540px;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 30px 20px;
            color: #6c7086;
            font-size: 0.9rem;
            border-top: 1px solid #313244;
            margin-top: 60px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 15px;
                gap: 12px;
            }

            .section-header h1 {
                font-size: 1.5rem;
            }

            .mindmap-wrapper iframe {
                height: 400px;
            }

            .container {
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="https://vub4k4.github.io/" class="logo">Vu Baka Portfolio</a>
        <a href="https://vub4k4.github.io/" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Portfolio
        </a>
    </nav>

    <main class="container">

        <div class="section-header">
            <h1><i class="fa-solid fa-diagram-project"></i> IAW Mindmap</h1>
            <p>Interactive mindmap — use fullscreen for the best experience.</p>
        </div>

        <div class="mindmap-wrapper">
            <iframe
                src="https://app.xmind.com/embed/G8twCy7T?sheet-id=94d8074374fa0870cef34ae258"
                width="900px"
                height="540px"
                frameborder="0"
                scrolling="no"
                allow="fullscreen">
            </iframe>
        </div>

    </main>

    <footer>
        <p>&copy; 2024 Vu Baka Roblox. All rights reserved.</p>
    </footer>

</body>
</html>
