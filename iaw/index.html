<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMind Full Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #000;
        }
        /* The Portfolio Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background-color: #ffffff;
            color: #333;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
        }
        .back-btn:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }
        /* Full Screen Iframe */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <a href="https://vub4k4.github.io/" class="back-btn">← Back to Portfolio</a>

    <iframe 
        src="https://app.xmind.com/embed/G8twCy7T?sheet-id=94d8074374fa0870cef34ae258" 
        allow="fullscreen">
    </iframe>

</body>
</html>
